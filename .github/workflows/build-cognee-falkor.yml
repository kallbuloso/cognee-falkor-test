name: Build Cognee Falkor image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile.cognee-falkor
      - .github/workflows/build-cognee-falkor.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kallbuloso/cognee-falkor-test
  IMAGE_TAG: main-5b32da7

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cognee-falkor
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Smoke test published image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        run: |
          docker pull "${IMAGE}"

          docker run --rm \
            --entrypoint /app/.venv/bin/python \
            "${IMAGE}" \
            -c "
          from cognee.infrastructure.databases.graph.supported_databases import supported_databases as graph
          from cognee.infrastructure.databases.vector.supported_databases import supported_databases as vector
          from cognee_community_hybrid_adapter_falkor.falkor_adapter import FalkorDBAdapter

          assert 'falkor' in graph
          assert 'falkor' in vector
          assert hasattr(FalkorDBAdapter, '_sanitize_cypher_params')
          assert hasattr(FalkorDBAdapter, '_deserialize_node_properties')

          print('Cognee/FalkorDB adapter smoke test passed')
          "
